<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery List</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/shared.css">
  <link rel="stylesheet" href="/grocery/grocery.css?v=20260629">
</head>
<body>
  <nav class="tools-nav">
    <a href="/" class="nav-back">← Tools</a>
    <span class="nav-title">🛒 Grocery List</span>
  </nav>

  <main id="app">
    <div id="loading" class="loading-state">Loading…</div>
    <div id="error-banner" class="error-banner" style="display:none"></div>

    <!-- Active list -->
    <section id="active-section" style="display:none">
      <div class="refresh-row">
        <button id="check-mail-btn" class="btn btn-secondary btn-sm">↻ Check mail now</button>
        <span id="refresh-status" class="refresh-status"></span>
      </div>
      <form id="add-item-form" class="add-item-bar">
        <input id="add-item-input" type="text" class="add-item-input" placeholder="Add an item…" autocomplete="off">
        <button type="submit" class="btn btn-primary btn-sm">Add</button>
      </form>
      <div id="categories-container"></div>
      <div id="pantry-check-container"></div>
      <div id="recipes-container"></div>
      <div class="archive-row">
        <button id="archive-checked-btn" class="btn btn-secondary">Archive checked items</button>
        <button id="archive-all-btn" class="btn btn-secondary">Archive full list</button>
        <button id="library-btn" class="btn btn-secondary">📋 Recipes</button>
      </div>
    </section>

    <!-- Archived lists -->
    <section id="archived-section" style="display:none">
      <details id="archived-details">
        <summary class="archived-toggle">Past lists</summary>
        <div id="archived-list"></div>
      </details>
    </section>
  </main>

  <!-- Archive confirmation modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <p class="modal-text">Archive this list? It will be saved and the active list will be cleared.</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn btn-primary">Archive</button>
      </div>
    </div>
  </div>

  <!-- Pick items modal -->
  <div id="pick-modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal modal-wide">
      <h3 class="modal-title">Add items to current list</h3>
      <div id="pick-items-list" class="pick-items-list"></div>
      <div class="modal-actions">
        <button id="pick-cancel" class="btn btn-secondary">Cancel</button>
        <button id="pick-confirm" class="btn btn-primary">Add checked items</button>
      </div>
    </div>
  </div>

  <!-- Recipe Library modal -->
  <div id="library-modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal modal-wide">
      <div class="library-modal-header">
        <h3 class="modal-title">Recipe Library</h3>
        <button id="library-close" class="library-close-btn" title="Close">×</button>
      </div>
      <div id="library-list" class="library-list"></div>
    </div>
  </div>

  <script src="/grocery/app.js?v=20260629"></script>
</body>
</html>
