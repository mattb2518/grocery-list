name: Deploy to droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 167.71.19.193
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/grocery-list
            git pull origin main
            /opt/grocery-list/venv/bin/pip install -q -r backend/requirements.txt
            sudo systemctl restart grocery-list
            sleep 3
            sudo systemctl is-active grocery-list || sudo journalctl -u grocery-list -n 30 --no-pager
